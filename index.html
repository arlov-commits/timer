<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b1410" />
<meta name="description" content="A bare-bones, 100% offline meditation timer. Set the duration on a rolling wheel and begin." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<title>dìng</title>
<style>
  :root {
    --midnight: #0b1410;
    --midnight-2: #10201a;
    --forest: #3f6b52;
    --forest-deep: #1d3327;
    --ochre: #cf9b46;
    --ochre-soft: rgba(207, 155, 70, 0.16);
    --cream: #e7dcc4;
    --muted: #7c8b80;
    --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    touch-action: manipulation;
  }
  /* the only place text entry is wanted */
  input { -webkit-user-select: text; -moz-user-select: text; user-select: text; }
  html, body { margin: 0; height: 100%; }

  body {
    background:
      radial-gradient(130% 110% at 50% -10%, var(--midnight-2) 0%, var(--midnight) 65%);
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%;
    padding: env(safe-area-inset-top) 20px calc(28px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .icon-btn {
    position: fixed; top: calc(14px + env(safe-area-inset-top));
    width: 44px; height: 44px; border-radius: 50%;
    border: none; background: transparent; color: var(--muted);
    font-size: 19px; cursor: pointer; opacity: 0.75;
    display: grid; place-items: center;
  }
  .icon-btn:active { transform: scale(0.92); }
  .icon-btn.right { right: 12px; }

  /* transient label naming the cycled-to tone */
  .tone-name {
    position: fixed; top: calc(58px + env(safe-area-inset-top)); right: 12px;
    color: var(--cream); font-size: 12px; letter-spacing: 0.4px;
    background: var(--midnight-2); border: 1px solid var(--forest-deep);
    padding: 5px 10px; border-radius: 999px; white-space: nowrap;
    opacity: 0; transform: translateY(-4px); pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .tone-name.show { opacity: 1; transform: translateY(0); }

  /* wordmark logo: the brush 定 ink mark (transparent PNG), top-left */
  .logo {
    position: fixed; top: calc(12px + env(safe-area-inset-top)); left: 14px;
    width: 34px; height: 34px; opacity: 0.9;
    pointer-events: none; user-select: none;
  }

  /* start-sound toggle pill, bottom-right corner */
  .toggle-pill {
    position: fixed; right: 14px; bottom: calc(14px + env(safe-area-inset-bottom));
    border: 1px solid var(--forest-deep); cursor: pointer; font-family: inherit;
    background: transparent; color: var(--muted);
    border-radius: 999px; padding: 7px 13px; font-size: 12px; letter-spacing: 0.4px;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .toggle-pill:active { transform: scale(0.96); }
  .toggle-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .toggle-pill.on { color: var(--ochre); border-color: rgba(207, 155, 70, 0.4); }
  .toggle-pill.on .dot { background: var(--ochre); }

  main {
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; align-items: center;
    gap: 28px;
  }

  /* ---------- Wheel picker (set mode) ---------- */
  .stage { position: relative; width: min(80vw, 300px); height: min(80vw, 300px); display: grid; place-items: center; }

  .picker {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: opacity 0.3s ease;
  }
  .wheel {
    height: 220px; width: 92px; overflow-y: scroll; position: relative;
    scroll-snap-type: y mandatory;
    -ms-overflow-style: none; scrollbar-width: none;
    mask-image: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
  }
  .wheel::-webkit-scrollbar { display: none; }
  .wheel .spacer { height: 88px; }
  .wheel .item {
    height: 44px; line-height: 44px; text-align: center;
    font-size: 34px; font-weight: 300; font-variant-numeric: tabular-nums;
    color: var(--muted); scroll-snap-align: center;
    transition: color 0.15s ease, transform 0.15s ease;
  }
  .wheel .item.sel { color: var(--cream); transform: scale(1.04); }
  .wheel-unit { color: var(--muted); font-size: 14px; letter-spacing: 1px; margin: 0 2px 0 -2px; align-self: center; }
  .picker .colon { font-size: 30px; color: var(--muted); font-weight: 300; }

  .picker-band {
    position: absolute; left: 0; right: 0; top: 50%; height: 46px;
    transform: translateY(-50%);
    border-top: 1px solid var(--forest-deep);
    border-bottom: 1px solid var(--forest-deep);
    pointer-events: none;
  }

  /* ---------- Countdown ring (run mode) ---------- */
  .ring { position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
  /* start at 12 o'clock; scaleY(-1) flips the draw direction so it depletes clockwise */
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg) scaleY(-1); }
  .ring-track { fill: none; stroke: var(--forest-deep); stroke-width: 6; }
  .ring-progress {
    fill: none; stroke: var(--ochre); stroke-width: 6; stroke-linecap: round;
    transition: stroke-dashoffset 0.4s linear;
  }
  .ring-time {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
  }
  .ring-time .t {
    font-size: clamp(46px, 15vw, 62px); font-weight: 300;
    font-variant-numeric: tabular-nums; letter-spacing: 1px; color: var(--cream);
  }
  .ring-time .label { color: var(--muted); font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; min-height: 16px; }

  .breath { position: absolute; inset: 8%; border-radius: 50%;
    background: radial-gradient(circle, var(--ochre-soft) 0%, transparent 70%); opacity: 0; }
  body.running .breath { animation: breathe 9s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { opacity: 0.12; transform: scale(0.8); } 50% { opacity: 0.5; transform: scale(1); } }

  /* state switches */
  body.run .picker { opacity: 0; pointer-events: none; }
  body.run .ring { opacity: 1; }

  /* ---------- Controls ---------- */
  .controls { display: flex; align-items: center; gap: 22px; min-height: 80px; }
  .btn {
    border: none; cursor: pointer; font-family: inherit; color: var(--cream);
    transition: transform 0.08s ease, opacity 0.2s ease;
  }
  .btn:active { transform: scale(0.94); }

  .btn-go {
    width: 84px; height: 84px; border-radius: 50%;
    background: var(--forest); color: var(--cream);
    font-size: 17px; letter-spacing: 1px; font-weight: 600;
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
    display: grid; place-items: center;
  }
  .btn-go.go-run { background: var(--ochre); color: #1a1206; }
  .btn-stop {
    width: 54px; height: 54px; border-radius: 50%;
    background: transparent; border: 1px solid var(--forest-deep); color: var(--muted);
    font-size: 20px; place-items: center;
    display: none;
  }
  body.run .btn-stop { display: grid; }

  /* ---------- Set-mode panel: presets + start-tone toggle ---------- */
  .setpanel { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
  body.run .setpanel { display: none; }

  .presets { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 340px; }
  .chip {
    border: none; cursor: pointer; font-family: inherit;
    background: var(--forest-deep); color: var(--cream);
    border-radius: 999px; padding: 8px 12px; font-size: 13px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: transform 0.08s ease;
  }
  .chip:active { transform: scale(0.95); }
  .chip .c-time { color: var(--muted); font-variant-numeric: tabular-nums; }
  .chip .c-x { color: var(--muted); font-size: 12px; line-height: 1; padding: 2px; margin: -2px -4px -2px 0; }
  .chip .c-x:hover { color: var(--cream); }
  .chip.add { background: transparent; border: 1px dashed var(--forest-deep); color: var(--muted); }

  .saverow { display: none; gap: 8px; align-items: center; }
  .saverow.open { display: flex; }
  .saverow input {
    width: 170px; padding: 10px 14px; font-size: 16px; font-family: inherit;
    background: var(--midnight-2); border: 1px solid var(--forest-deep);
    border-radius: 999px; color: var(--cream);
  }
  .saverow input:focus { outline: none; border-color: var(--ochre); }
  .saverow .s-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none; cursor: pointer;
    display: grid; place-items: center; font-size: 15px;
  }
  .saverow .ok { background: var(--ochre); color: #1a1206; }
  .saverow .no { background: var(--forest-deep); color: var(--muted); }

  /* ---------- Footer + info tooltip ---------- */
  footer {
    position: fixed; left: 16px; bottom: calc(14px + env(safe-area-inset-bottom));
    color: var(--muted); font-size: 12px; letter-spacing: 0.5px; opacity: 0.85;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .info {
    border: none; background: transparent; color: var(--muted); cursor: pointer;
    width: 22px; height: 22px; border-radius: 50%; font-size: 13px;
    display: grid; place-items: center; line-height: 1;
  }
  .info:active { transform: scale(0.9); }
  .tip {
    position: absolute; bottom: 30px; left: 0; transform: translateY(6px);
    width: max-content; max-width: 74vw;
    background: var(--midnight-2); color: var(--cream);
    border: 1px solid var(--forest-deep); border-radius: 12px;
    padding: 10px 13px; font-size: 12px; line-height: 1.45; letter-spacing: 0.2px;
    box-shadow: var(--shadow); text-align: left;
    opacity: 0; pointer-events: none; transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .tip::after {
    content: ""; position: absolute; bottom: -6px; left: 18px; transform: rotate(45deg);
    width: 10px; height: 10px; background: var(--midnight-2);
    border-right: 1px solid var(--forest-deep); border-bottom: 1px solid var(--forest-deep);
  }
  footer.tip-open .tip { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
  <img class="logo" src="assets/logo-mark.png" alt="dìng" />
  <button class="icon-btn right" id="toneBtn" aria-label="Bell tone">🔔</button>
  <span class="tone-name" id="toneName" aria-live="polite"></span>

  <main>
    <div class="stage">
      <div class="breath"></div>

      <!-- SET MODE: rolling wheels -->
      <div class="picker" id="picker">
        <div class="wheel" id="wheelMin" aria-label="minutes"></div>
        <span class="wheel-unit">min</span>
        <span class="colon">:</span>
        <div class="wheel" id="wheelSec" aria-label="seconds"></div>
        <span class="wheel-unit">sec</span>
        <div class="picker-band"></div>
      </div>

      <!-- RUN MODE: countdown ring -->
      <div class="ring">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <circle class="ring-track" cx="50" cy="50" r="46" />
          <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="46" />
        </svg>
        <div class="ring-time">
          <div class="t" id="timeText">10:00</div>
          <div class="label" id="timeLabel"></div>
        </div>
      </div>
    </div>

    <div class="setpanel">
      <div class="presets" id="presets"></div>
      <div class="saverow" id="saverow">
        <input id="presetName" type="text" maxlength="20" placeholder="name this length" />
        <button class="s-btn ok" id="presetSave" aria-label="Save preset">✓</button>
        <button class="s-btn no" id="presetCancel" aria-label="Cancel">✕</button>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-stop" id="stopBtn" aria-label="Stop">✕</button>
      <button class="btn btn-go" id="goBtn">START</button>
    </div>
  </main>

  <button class="toggle-pill on" id="startToneBtn" aria-label="Toggle start sound">
    <span class="dot"></span><span id="startToneLabel">start sound · on</span>
  </button>

  <footer id="footer">
    <span>100% offline</span>
    <button class="info" id="infoBtn" aria-label="About installing this app">&#9432;</button>
    <span class="tip" id="tip" role="tooltip">add this page to your home screen to save it as an app on your device</span>
  </footer>

<script>
(function () {
  "use strict";

  // ---------- Migrate legacy "still.*" storage to "ding.*" (one-time) ----------
  try {
    ["sound", "starttone", "dur", "presets"].forEach(function (k) {
      var oldK = "still." + k, newK = "ding." + k;
      if (localStorage.getItem(newK) === null && localStorage.getItem(oldK) !== null) {
        localStorage.setItem(newK, localStorage.getItem(oldK));
      }
    });
  } catch (e) {}

  // ---------- Bell (synthesized, no audio files = fully offline) ----------
  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }
  function synthBell(strength) {
    var ctx = ensureAudio(); if (!ctx) return;
    var now = ctx.currentTime, g = strength || 1;
    var master = ctx.createGain();
    master.connect(ctx.destination);
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(0.9 * g, now + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, now + 4.2);
    [[432, 0.5, 4], [648, 0.22, 3], [864, 0.12, 2.2]].forEach(function (p) {
      var osc = ctx.createOscillator(), gg = ctx.createGain();
      osc.type = "sine"; osc.frequency.value = p[0];
      gg.gain.setValueAtTime(p[1], now);
      gg.gain.exponentialRampToValueAtTime(0.0001, now + p[2]);
      osc.connect(gg); gg.connect(master);
      osc.start(now); osc.stop(now + p[2] + 0.1);
    });
  }

  var $ = function (id) { return document.getElementById(id); };

  // ---------- Bell tones (selectable; cycled via the top-right icon) ----------
  var TONES = [
    { id: "meditation-bell", name: "Meditation bell", src: "assets/sounds/freesound_community-bell-meditation-75335.mp3" },
    { id: "singing-bell",    name: "Singing bell",    src: "assets/sounds/freesound_community-singing-bell-hit-2-75258.mp3" },
    { id: "root-chakra",     name: "Root chakra",     src: "assets/sounds/floraphonic-deep-meditation-bell-hit-root-chakra-1-174455.mp3" },
    { id: "burmese-bell",    name: "Burmese bell",    src: "assets/sounds/mandakimdk-big-bellburmese-367944.mp3" },
    { id: "ding",            name: "Ding",            src: "assets/sounds/freesound_community-ding-101492.mp3" },
    { id: "silent",          name: "Silent" }
  ];
  function toneById(id) {
    for (var i = 0; i < TONES.length; i++) if (TONES[i].id === id) return TONES[i];
    return TONES[0];
  }

  // current selection, persisted. migrate the old mute flag (ding.sound=off -> silent)
  var currentToneId = TONES[0].id;
  try {
    var savedTone = localStorage.getItem("ding.tone");
    if (savedTone && toneById(savedTone).id === savedTone) currentToneId = savedTone;
    else if (localStorage.getItem("ding.sound") === "off") currentToneId = "silent";
  } catch (e) {}

  var audioEls = {};
  function getAudio(t) {
    if (!t.src) return null;
    if (!audioEls[t.id]) { var a = new Audio(t.src); a.preload = "auto"; audioEls[t.id] = a; }
    return audioEls[t.id];
  }
  // play the currently selected tone — the single entry point for start + end bells
  function bell(strength) {
    var t = toneById(currentToneId);
    if (t.id === "silent" || !t.src) return;
    var a = getAudio(t);
    try {
      a.pause(); a.currentTime = 0;
      a.volume = Math.max(0, Math.min(1, strength == null ? 1 : strength));
      var pr = a.play();
      if (pr && pr.catch) pr.catch(function () { synthBell(strength); });
    } catch (e) { synthBell(strength); }
  }
  // unlock the audio element inside a user gesture so the end bell can fire later (iOS)
  function primeTone() {
    var t = toneById(currentToneId);
    if (t.id === "silent" || !t.src) return;
    var a = getAudio(t);
    try {
      a.volume = 0;
      var pr = a.play();
      if (pr && pr.then) pr.then(function () { a.pause(); a.currentTime = 0; a.volume = 1; }).catch(function () {});
    } catch (e) {}
  }

  var toneBtn = $("toneBtn"), toneName = $("toneName"), toneNameTimer = null;
  function renderTone() {
    var t = toneById(currentToneId), silent = t.id === "silent";
    toneBtn.textContent = silent ? "🔕" : "🔔";
    toneBtn.style.opacity = silent ? "0.4" : "0.75";
    toneBtn.setAttribute("aria-label", silent ? "Bell tone: silent" : "Bell tone: " + t.name);
    toneBtn.title = silent ? "Silent" : t.name;
  }
  function flashToneName(name) {
    toneName.textContent = name;
    toneName.classList.add("show");
    clearTimeout(toneNameTimer);
    toneNameTimer = setTimeout(function () { toneName.classList.remove("show"); }, 1400);
  }
  function setTone(id, opts) {
    currentToneId = toneById(id).id;
    try { localStorage.setItem("ding.tone", currentToneId); } catch (e) {}
    renderTone();
    if (opts && opts.flash) flashToneName(toneById(currentToneId).name);
    if (opts && opts.preview && currentToneId !== "silent") bell(0.85);
  }
  toneBtn.addEventListener("click", function () {
    var i = TONES.indexOf(toneById(currentToneId));
    setTone(TONES[(i + 1) % TONES.length].id, { flash: true, preview: true });
  });
  renderTone();

  // ---------- Start-tone pref (independent toggle) ----------
  var startToneOn = true;
  try { startToneOn = localStorage.getItem("ding.starttone") !== "off"; } catch (e) {}
  var startToneBtn = $("startToneBtn"), startToneLabel = $("startToneLabel");
  function renderStartTone() {
    startToneBtn.classList.toggle("on", startToneOn);
    startToneBtn.setAttribute("aria-pressed", startToneOn ? "true" : "false");
    startToneLabel.textContent = startToneOn ? "start sound · on" : "start sound · off";
  }
  startToneBtn.addEventListener("click", function () {
    startToneOn = !startToneOn;
    try { localStorage.setItem("ding.starttone", startToneOn ? "on" : "off"); } catch (e) {}
    renderStartTone();
    if (startToneOn) bell(0.5);
  });
  renderStartTone();

  // ---------- Rolling wheel picker ----------
  var ITEM = 44;
  function buildWheel(el, count, fmtFn) {
    var top = document.createElement("div"); top.className = "spacer"; el.appendChild(top);
    for (var i = 0; i < count; i++) {
      var d = document.createElement("div");
      d.className = "item";
      d.textContent = fmtFn(i);
      d.dataset.val = i;
      el.appendChild(d);
    }
    var bot = document.createElement("div"); bot.className = "spacer"; el.appendChild(bot);
  }
  function wheelValue(el) { return Math.round(el.scrollTop / ITEM); }
  function setWheel(el, val) { el.scrollTop = val * ITEM; markSelected(el); }
  function markSelected(el) {
    var idx = wheelValue(el);
    var items = el.querySelectorAll(".item");
    for (var i = 0; i < items.length; i++) items[i].classList.toggle("sel", i === idx);
  }
  function attachWheel(el) {
    var raf, settle;
    el.addEventListener("scroll", function () {
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(function () { markSelected(el); });
      // persist the chosen duration once the wheel comes to rest (per device)
      clearTimeout(settle);
      settle = setTimeout(persistDuration, 250);
    }, { passive: true });
  }
  function persistDuration() {
    try { localStorage.setItem("ding.dur", String(pickedSeconds())); } catch (e) {}
  }

  var wheelMin = $("wheelMin"), wheelSec = $("wheelSec");
  buildWheel(wheelMin, 121, function (i) { return i; });          // 0..120 minutes
  buildWheel(wheelSec, 60, function (i) { return (i < 10 ? "0" : "") + i; }); // 0..59 seconds
  attachWheel(wheelMin); attachWheel(wheelSec);

  function pickedSeconds() { return wheelValue(wheelMin) * 60 + wheelValue(wheelSec); }

  // restore last duration, default 10:00
  var lastDur = 600;
  try { var s = parseInt(localStorage.getItem("ding.dur"), 10); if (!isNaN(s) && s > 0) lastDur = s; } catch (e) {}
  setWheel(wheelMin, Math.min(120, Math.floor(lastDur / 60)));
  setWheel(wheelSec, lastDur % 60);

  // ---------- Named presets (saved locally) ----------
  var presets = [];
  try { var pr = JSON.parse(localStorage.getItem("ding.presets") || "[]"); if (Array.isArray(pr)) presets = pr; } catch (e) {}
  var presetsEl = $("presets"), saverow = $("saverow"), presetName = $("presetName");

  function savePresets() { try { localStorage.setItem("ding.presets", JSON.stringify(presets)); } catch (e) {} }
  function fmtShort(sec) { var m = Math.floor(sec / 60), s = sec % 60; return m + ":" + (s < 10 ? "0" : "") + s; }

  function renderPresets() {
    presetsEl.innerHTML = "";
    presets.forEach(function (p) {
      var chip = document.createElement("button");
      chip.className = "chip";
      chip.innerHTML = '<span class="c-name"></span><span class="c-time"></span><span class="c-x" aria-label="remove">✕</span>';
      chip.querySelector(".c-name").textContent = p.name;
      chip.querySelector(".c-time").textContent = fmtShort(p.sec);
      chip.addEventListener("click", function (e) {
        if (e.target.classList.contains("c-x")) { e.stopPropagation(); removePreset(p.id); return; }
        loadPreset(p);
      });
      presetsEl.appendChild(chip);
    });
    var add = document.createElement("button");
    add.className = "chip add";
    add.textContent = "＋ save";
    add.addEventListener("click", openSave);
    presetsEl.appendChild(add);
  }

  function loadPreset(p) {
    setWheel(wheelMin, Math.min(120, Math.floor(p.sec / 60)));
    setWheel(wheelSec, p.sec % 60);
    if (p.tone) setTone(p.tone, { flash: true });   // restore the preset's tone (no preview sound)
  }
  function removePreset(id) {
    presets = presets.filter(function (p) { return p.id !== id; });
    savePresets(); renderPresets();
  }
  function openSave() {
    saverow.classList.add("open");
    presetName.value = "";
    setTimeout(function () { presetName.focus(); }, 30);
  }
  function closeSave() { saverow.classList.remove("open"); }
  function commitSave() {
    var sec = pickedSeconds();
    if (sec <= 0) { closeSave(); return; }
    var name = (presetName.value || "").trim() || fmtShort(sec);
    presets.push({ id: "p" + Date.now(), name: name, sec: sec, tone: currentToneId });
    savePresets(); renderPresets(); closeSave();
  }
  $("presetSave").addEventListener("click", commitSave);
  $("presetCancel").addEventListener("click", closeSave);
  presetName.addEventListener("keydown", function (e) {
    if (e.key === "Enter") commitSave();
    else if (e.key === "Escape") closeSave();
  });
  renderPresets();

  // ---------- Timer ----------
  var ring = $("ringProgress");
  var timeText = $("timeText"), timeLabel = $("timeLabel");
  var goBtn = $("goBtn"), stopBtn = $("stopBtn");
  var CIRC = 2 * Math.PI * 46;
  ring.style.strokeDasharray = CIRC;

  var totalSec = lastDur, remaining = lastDur, endAt = 0, running = false, ticker = null;

  function fmt(sec) {
    sec = Math.max(0, Math.round(sec));
    var m = Math.floor(sec / 60), s = sec % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }
  function renderRing() {
    timeText.textContent = fmt(remaining);
    var frac = totalSec > 0 ? remaining / totalSec : 0;
    ring.style.strokeDashoffset = CIRC * (1 - frac);
  }

  function start() {
    totalSec = pickedSeconds();
    if (totalSec <= 0) { bell(0.3); return; }      // nothing set; nudge
    try { localStorage.setItem("ding.dur", String(totalSec)); } catch (e) {}
    remaining = totalSec;
    enterRun();
    if (startToneOn) bell(0.7); else primeTone();   // play start bell, or just unlock audio for the end bell
    beginTicking();
  }
  function beginTicking() {
    running = true;
    document.body.classList.add("running");
    goBtn.textContent = "PAUSE";
    timeLabel.textContent = "";
    endAt = Date.now() + remaining * 1000;
    tick();
    ticker = setInterval(tick, 200);
  }
  function pause() {
    running = false;
    document.body.classList.remove("running");
    goBtn.textContent = "RESUME";
    timeLabel.textContent = "paused";
    clearInterval(ticker); ticker = null;
  }
  function resume() {
    if (remaining <= 0) return;
    document.body.classList.add("running");
    goBtn.textContent = "PAUSE";
    timeLabel.textContent = "";
    running = true;
    endAt = Date.now() + remaining * 1000;
    tick();
    ticker = setInterval(tick, 200);
  }
  function tick() {
    remaining = (endAt - Date.now()) / 1000;
    if (remaining <= 0) { remaining = 0; renderRing(); finish(); return; }
    renderRing();
  }
  function finish() {
    running = false;
    clearInterval(ticker); ticker = null;
    document.body.classList.remove("running");
    bell(1);
    timeText.textContent = "0:00";
    timeLabel.textContent = "complete";
    goBtn.textContent = "DONE";
  }

  function enterRun() {
    document.body.classList.add("run");
    goBtn.classList.add("go-run");
    renderRing();
  }
  // Return to the wheel — the core "set without resetting" flow:
  // tweak the wheel and start again, no extra reset step.
  function toSetMode() {
    running = false;
    clearInterval(ticker); ticker = null;
    document.body.classList.remove("run", "running");
    goBtn.classList.remove("go-run");
    goBtn.textContent = "START";
    timeLabel.textContent = "";
  }

  goBtn.addEventListener("click", function () {
    ensureAudio();
    if (!document.body.classList.contains("run")) { start(); return; }
    if (running) { pause(); }
    else if (remaining > 0) { resume(); }
    else { toSetMode(); }            // DONE -> back to wheel
  });
  stopBtn.addEventListener("click", toSetMode);

  document.addEventListener("keydown", function (e) {
    if (e.target && e.target.tagName === "INPUT") return;
    if (e.code === "Space") {
      e.preventDefault(); ensureAudio();
      if (!document.body.classList.contains("run")) start();
      else if (running) pause();
      else if (remaining > 0) resume();
      else toSetMode();
    } else if (e.key === "Escape") {
      if (document.body.classList.contains("run")) toSetMode();
    }
  });

  document.addEventListener("visibilitychange", function () { if (!document.hidden && running) tick(); });

  // ---------- Footer info tooltip (tap to toggle; works without hover) ----------
  var footer = $("footer"), infoBtn = $("infoBtn");
  infoBtn.addEventListener("click", function (e) {
    e.stopPropagation();
    footer.classList.toggle("tip-open");
  });
  document.addEventListener("click", function (e) {
    if (!footer.contains(e.target)) footer.classList.remove("tip-open");
  });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }
})();
</script>
</body>
</html>
