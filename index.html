<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0b1410" />
<meta name="description" content="A bare-bones, 100% offline meditation timer. Set the duration on a rolling wheel and begin." />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<title>Still</title>
<style>
  :root {
    --midnight: #0b1410;
    --midnight-2: #10201a;
    --forest: #3f6b52;
    --forest-deep: #1d3327;
    --ochre: #cf9b46;
    --ochre-soft: rgba(207, 155, 70, 0.16);
    --cream: #e7dcc4;
    --muted: #7c8b80;
    --shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }

  body {
    background:
      radial-gradient(130% 110% at 50% -10%, var(--midnight-2) 0%, var(--midnight) 65%);
    color: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%;
    padding: env(safe-area-inset-top) 20px calc(28px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .mute {
    position: fixed; top: calc(14px + env(safe-area-inset-top)); right: 16px;
    width: 42px; height: 42px; border-radius: 50%;
    border: none; background: transparent; color: var(--muted);
    font-size: 19px; cursor: pointer; opacity: 0.7;
  }
  .mute:active { transform: scale(0.92); }

  main {
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; align-items: center;
    gap: 28px;
  }

  /* ---------- Wheel picker (set mode) ---------- */
  .stage { position: relative; width: min(80vw, 300px); height: min(80vw, 300px); display: grid; place-items: center; }

  .picker {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    transition: opacity 0.3s ease;
  }
  .wheel {
    height: 220px; width: 92px; overflow-y: scroll; position: relative;
    scroll-snap-type: y mandatory;
    -ms-overflow-style: none; scrollbar-width: none;
    mask-image: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
  }
  .wheel::-webkit-scrollbar { display: none; }
  .wheel .spacer { height: 88px; }
  .wheel .item {
    height: 44px; line-height: 44px; text-align: center;
    font-size: 34px; font-weight: 300; font-variant-numeric: tabular-nums;
    color: var(--muted); scroll-snap-align: center;
    transition: color 0.15s ease, transform 0.15s ease;
  }
  .wheel .item.sel { color: var(--cream); transform: scale(1.04); }
  .wheel-unit { color: var(--muted); font-size: 14px; letter-spacing: 1px; margin: 0 2px 0 -2px; align-self: center; }
  .picker .colon { font-size: 30px; color: var(--muted); font-weight: 300; }

  .picker-band {
    position: absolute; left: 0; right: 0; top: 50%; height: 46px;
    transform: translateY(-50%);
    border-top: 1px solid var(--forest-deep);
    border-bottom: 1px solid var(--forest-deep);
    pointer-events: none;
  }

  /* ---------- Countdown ring (run mode) ---------- */
  .ring { position: absolute; inset: 0; opacity: 0; transition: opacity 0.3s ease; pointer-events: none; }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: var(--forest-deep); stroke-width: 6; }
  .ring-progress {
    fill: none; stroke: var(--ochre); stroke-width: 6; stroke-linecap: round;
    transition: stroke-dashoffset 0.4s linear;
  }
  .ring-time {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
  }
  .ring-time .t {
    font-size: clamp(46px, 15vw, 62px); font-weight: 300;
    font-variant-numeric: tabular-nums; letter-spacing: 1px; color: var(--cream);
  }
  .ring-time .label { color: var(--muted); font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; min-height: 16px; }

  .breath { position: absolute; inset: 8%; border-radius: 50%;
    background: radial-gradient(circle, var(--ochre-soft) 0%, transparent 70%); opacity: 0; }
  body.running .breath { animation: breathe 9s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { opacity: 0.12; transform: scale(0.8); } 50% { opacity: 0.5; transform: scale(1); } }

  /* state switches */
  body.run .picker { opacity: 0; pointer-events: none; }
  body.run .ring { opacity: 1; }

  /* ---------- Controls ---------- */
  .controls { display: flex; align-items: center; gap: 22px; min-height: 80px; }
  .btn {
    border: none; cursor: pointer; font-family: inherit; color: var(--cream);
    transition: transform 0.08s ease, opacity 0.2s ease;
  }
  .btn:active { transform: scale(0.94); }

  .btn-go {
    width: 84px; height: 84px; border-radius: 50%;
    background: var(--forest); color: var(--cream);
    font-size: 17px; letter-spacing: 1px; font-weight: 600;
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
    display: grid; place-items: center;
  }
  .btn-go.go-run { background: var(--ochre); color: #1a1206; }
  .btn-stop {
    width: 54px; height: 54px; border-radius: 50%;
    background: transparent; border: 1px solid var(--forest-deep); color: var(--muted);
    font-size: 20px; place-items: center;
    display: none;
  }
  body.run .btn-stop { display: grid; }

  /* ---------- Set-mode panel: presets + start-tone toggle ---------- */
  .setpanel { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; }
  body.run .setpanel { display: none; }

  .presets { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 340px; }
  .chip {
    border: none; cursor: pointer; font-family: inherit;
    background: var(--forest-deep); color: var(--cream);
    border-radius: 999px; padding: 8px 12px; font-size: 13px;
    display: inline-flex; align-items: center; gap: 8px;
    transition: transform 0.08s ease;
  }
  .chip:active { transform: scale(0.95); }
  .chip .c-time { color: var(--muted); font-variant-numeric: tabular-nums; }
  .chip .c-x { color: var(--muted); font-size: 12px; line-height: 1; padding: 2px; margin: -2px -4px -2px 0; }
  .chip .c-x:hover { color: var(--cream); }
  .chip.add { background: transparent; border: 1px dashed var(--forest-deep); color: var(--muted); }

  .saverow { display: none; gap: 8px; align-items: center; }
  .saverow.open { display: flex; }
  .saverow input {
    width: 160px; padding: 9px 12px; font-size: 14px; font-family: inherit;
    background: var(--midnight-2); border: 1px solid var(--forest-deep);
    border-radius: 999px; color: var(--cream);
  }
  .saverow input:focus { outline: none; border-color: var(--ochre); }
  .saverow .s-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none; cursor: pointer;
    display: grid; place-items: center; font-size: 15px;
  }
  .saverow .ok { background: var(--ochre); color: #1a1206; }
  .saverow .no { background: var(--forest-deep); color: var(--muted); }

  .toggle-pill {
    border: 1px solid var(--forest-deep); cursor: pointer; font-family: inherit;
    background: transparent; color: var(--muted);
    border-radius: 999px; padding: 7px 14px; font-size: 12px; letter-spacing: 0.4px;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .toggle-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .toggle-pill.on { color: var(--ochre); border-color: rgba(207, 155, 70, 0.4); }
  .toggle-pill.on .dot { background: var(--ochre); }

  footer { position: fixed; bottom: calc(14px + env(safe-area-inset-bottom)); color: var(--muted); font-size: 11px; letter-spacing: 0.5px; opacity: 0.7; }
</style>
</head>
<body>
  <button class="mute" id="muteBtn" aria-label="Toggle sound">🔔</button>

  <main>
    <div class="stage">
      <div class="breath"></div>

      <!-- SET MODE: rolling wheels -->
      <div class="picker" id="picker">
        <div class="wheel" id="wheelMin" aria-label="minutes"></div>
        <span class="wheel-unit">min</span>
        <span class="colon">:</span>
        <div class="wheel" id="wheelSec" aria-label="seconds"></div>
        <span class="wheel-unit">sec</span>
        <div class="picker-band"></div>
      </div>

      <!-- RUN MODE: countdown ring -->
      <div class="ring">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <circle class="ring-track" cx="50" cy="50" r="46" />
          <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="46" />
        </svg>
        <div class="ring-time">
          <div class="t" id="timeText">10:00</div>
          <div class="label" id="timeLabel"></div>
        </div>
      </div>
    </div>

    <div class="setpanel">
      <div class="presets" id="presets"></div>
      <div class="saverow" id="saverow">
        <input id="presetName" type="text" maxlength="20" placeholder="name this length" />
        <button class="s-btn ok" id="presetSave" aria-label="Save preset">✓</button>
        <button class="s-btn no" id="presetCancel" aria-label="Cancel">✕</button>
      </div>
      <button class="toggle-pill" id="startToneBtn"><span class="dot"></span><span id="startToneLabel">start tone</span></button>
    </div>

    <div class="controls">
      <button class="btn btn-stop" id="stopBtn" aria-label="Stop">✕</button>
      <button class="btn btn-go" id="goBtn">START</button>
    </div>
  </main>

  <footer>100% offline · spin to set · tap start</footer>

<script>
(function () {
  "use strict";

  // ---------- Bell (synthesized, no audio files = fully offline) ----------
  var audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }
  function bell(strength) {
    if (!soundOn) return;
    var ctx = ensureAudio(); if (!ctx) return;
    var now = ctx.currentTime, g = strength || 1;
    var master = ctx.createGain();
    master.connect(ctx.destination);
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(0.9 * g, now + 0.02);
    master.gain.exponentialRampToValueAtTime(0.0001, now + 4.2);
    [[432, 0.5, 4], [648, 0.22, 3], [864, 0.12, 2.2]].forEach(function (p) {
      var osc = ctx.createOscillator(), gg = ctx.createGain();
      osc.type = "sine"; osc.frequency.value = p[0];
      gg.gain.setValueAtTime(p[1], now);
      gg.gain.exponentialRampToValueAtTime(0.0001, now + p[2]);
      osc.connect(gg); gg.connect(master);
      osc.start(now); osc.stop(now + p[2] + 0.1);
    });
  }

  var $ = function (id) { return document.getElementById(id); };

  // ---------- Sound pref ----------
  var soundOn = true;
  try { soundOn = localStorage.getItem("still.sound") !== "off"; } catch (e) {}
  var muteBtn = $("muteBtn");
  function renderMute() { muteBtn.textContent = soundOn ? "🔔" : "🔕"; muteBtn.style.opacity = soundOn ? "0.75" : "0.4"; }
  muteBtn.addEventListener("click", function () {
    soundOn = !soundOn;
    try { localStorage.setItem("still.sound", soundOn ? "on" : "off"); } catch (e) {}
    renderMute();
    if (soundOn) { ensureAudio(); bell(0.4); }
  });
  renderMute();

  // ---------- Start-tone pref (independent toggle) ----------
  var startToneOn = true;
  try { startToneOn = localStorage.getItem("still.starttone") !== "off"; } catch (e) {}
  var startToneBtn = $("startToneBtn"), startToneLabel = $("startToneLabel");
  function renderStartTone() {
    startToneBtn.classList.toggle("on", startToneOn);
    startToneLabel.textContent = startToneOn ? "start tone · on" : "start tone · off";
  }
  startToneBtn.addEventListener("click", function () {
    startToneOn = !startToneOn;
    try { localStorage.setItem("still.starttone", startToneOn ? "on" : "off"); } catch (e) {}
    renderStartTone();
    if (startToneOn && soundOn) { ensureAudio(); bell(0.5); }
  });
  renderStartTone();

  // ---------- Rolling wheel picker ----------
  var ITEM = 44;
  function buildWheel(el, count, fmtFn) {
    var top = document.createElement("div"); top.className = "spacer"; el.appendChild(top);
    for (var i = 0; i < count; i++) {
      var d = document.createElement("div");
      d.className = "item";
      d.textContent = fmtFn(i);
      d.dataset.val = i;
      el.appendChild(d);
    }
    var bot = document.createElement("div"); bot.className = "spacer"; el.appendChild(bot);
  }
  function wheelValue(el) { return Math.round(el.scrollTop / ITEM); }
  function setWheel(el, val) { el.scrollTop = val * ITEM; markSelected(el); }
  function markSelected(el) {
    var idx = wheelValue(el);
    var items = el.querySelectorAll(".item");
    for (var i = 0; i < items.length; i++) items[i].classList.toggle("sel", i === idx);
  }
  function attachWheel(el) {
    var raf;
    el.addEventListener("scroll", function () {
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(function () { markSelected(el); });
    }, { passive: true });
  }

  var wheelMin = $("wheelMin"), wheelSec = $("wheelSec");
  buildWheel(wheelMin, 121, function (i) { return i; });          // 0..120 minutes
  buildWheel(wheelSec, 60, function (i) { return (i < 10 ? "0" : "") + i; }); // 0..59 seconds
  attachWheel(wheelMin); attachWheel(wheelSec);

  function pickedSeconds() { return wheelValue(wheelMin) * 60 + wheelValue(wheelSec); }

  // restore last duration, default 10:00
  var lastDur = 600;
  try { var s = parseInt(localStorage.getItem("still.dur"), 10); if (!isNaN(s) && s > 0) lastDur = s; } catch (e) {}
  setWheel(wheelMin, Math.min(120, Math.floor(lastDur / 60)));
  setWheel(wheelSec, lastDur % 60);

  // ---------- Named presets (saved locally) ----------
  var presets = [];
  try { var pr = JSON.parse(localStorage.getItem("still.presets") || "[]"); if (Array.isArray(pr)) presets = pr; } catch (e) {}
  var presetsEl = $("presets"), saverow = $("saverow"), presetName = $("presetName");

  function savePresets() { try { localStorage.setItem("still.presets", JSON.stringify(presets)); } catch (e) {} }
  function fmtShort(sec) { var m = Math.floor(sec / 60), s = sec % 60; return m + ":" + (s < 10 ? "0" : "") + s; }

  function renderPresets() {
    presetsEl.innerHTML = "";
    presets.forEach(function (p) {
      var chip = document.createElement("button");
      chip.className = "chip";
      chip.innerHTML = '<span class="c-name"></span><span class="c-time"></span><span class="c-x" aria-label="remove">✕</span>';
      chip.querySelector(".c-name").textContent = p.name;
      chip.querySelector(".c-time").textContent = fmtShort(p.sec);
      chip.addEventListener("click", function (e) {
        if (e.target.classList.contains("c-x")) { e.stopPropagation(); removePreset(p.id); return; }
        loadPreset(p);
      });
      presetsEl.appendChild(chip);
    });
    var add = document.createElement("button");
    add.className = "chip add";
    add.textContent = "＋ save";
    add.addEventListener("click", openSave);
    presetsEl.appendChild(add);
  }

  function loadPreset(p) {
    setWheel(wheelMin, Math.min(120, Math.floor(p.sec / 60)));
    setWheel(wheelSec, p.sec % 60);
  }
  function removePreset(id) {
    presets = presets.filter(function (p) { return p.id !== id; });
    savePresets(); renderPresets();
  }
  function openSave() {
    saverow.classList.add("open");
    presetName.value = "";
    setTimeout(function () { presetName.focus(); }, 30);
  }
  function closeSave() { saverow.classList.remove("open"); }
  function commitSave() {
    var sec = pickedSeconds();
    if (sec <= 0) { closeSave(); return; }
    var name = (presetName.value || "").trim() || fmtShort(sec);
    presets.push({ id: "p" + Date.now(), name: name, sec: sec });
    savePresets(); renderPresets(); closeSave();
  }
  $("presetSave").addEventListener("click", commitSave);
  $("presetCancel").addEventListener("click", closeSave);
  presetName.addEventListener("keydown", function (e) {
    if (e.key === "Enter") commitSave();
    else if (e.key === "Escape") closeSave();
  });
  renderPresets();

  // ---------- Timer ----------
  var ring = $("ringProgress");
  var timeText = $("timeText"), timeLabel = $("timeLabel");
  var goBtn = $("goBtn"), stopBtn = $("stopBtn");
  var CIRC = 2 * Math.PI * 46;
  ring.style.strokeDasharray = CIRC;

  var totalSec = lastDur, remaining = lastDur, endAt = 0, running = false, ticker = null;

  function fmt(sec) {
    sec = Math.max(0, Math.round(sec));
    var m = Math.floor(sec / 60), s = sec % 60;
    return m + ":" + (s < 10 ? "0" : "") + s;
  }
  function renderRing() {
    timeText.textContent = fmt(remaining);
    var frac = totalSec > 0 ? remaining / totalSec : 0;
    ring.style.strokeDashoffset = CIRC * (1 - frac);
  }

  function start() {
    totalSec = pickedSeconds();
    if (totalSec <= 0) { bell(0.3); return; }      // nothing set; nudge
    try { localStorage.setItem("still.dur", String(totalSec)); } catch (e) {}
    remaining = totalSec;
    enterRun();
    if (startToneOn) bell(0.7);
    beginTicking();
  }
  function beginTicking() {
    running = true;
    document.body.classList.add("running");
    goBtn.textContent = "PAUSE";
    timeLabel.textContent = "";
    endAt = Date.now() + remaining * 1000;
    tick();
    ticker = setInterval(tick, 200);
  }
  function pause() {
    running = false;
    document.body.classList.remove("running");
    goBtn.textContent = "RESUME";
    timeLabel.textContent = "paused";
    clearInterval(ticker); ticker = null;
  }
  function resume() {
    if (remaining <= 0) return;
    document.body.classList.add("running");
    goBtn.textContent = "PAUSE";
    timeLabel.textContent = "";
    running = true;
    endAt = Date.now() + remaining * 1000;
    tick();
    ticker = setInterval(tick, 200);
  }
  function tick() {
    remaining = (endAt - Date.now()) / 1000;
    if (remaining <= 0) { remaining = 0; renderRing(); finish(); return; }
    renderRing();
  }
  function finish() {
    running = false;
    clearInterval(ticker); ticker = null;
    document.body.classList.remove("running");
    bell(1);
    timeText.textContent = "0:00";
    timeLabel.textContent = "complete";
    goBtn.textContent = "DONE";
  }

  function enterRun() {
    document.body.classList.add("run");
    goBtn.classList.add("go-run");
    renderRing();
  }
  // Return to the wheel — the core "set without resetting" flow:
  // tweak the wheel and start again, no extra reset step.
  function toSetMode() {
    running = false;
    clearInterval(ticker); ticker = null;
    document.body.classList.remove("run", "running");
    goBtn.classList.remove("go-run");
    goBtn.textContent = "START";
    timeLabel.textContent = "";
  }

  goBtn.addEventListener("click", function () {
    ensureAudio();
    if (!document.body.classList.contains("run")) { start(); return; }
    if (running) { pause(); }
    else if (remaining > 0) { resume(); }
    else { toSetMode(); }            // DONE -> back to wheel
  });
  stopBtn.addEventListener("click", toSetMode);

  document.addEventListener("keydown", function (e) {
    if (e.target && e.target.tagName === "INPUT") return;
    if (e.code === "Space") {
      e.preventDefault(); ensureAudio();
      if (!document.body.classList.contains("run")) start();
      else if (running) pause();
      else if (remaining > 0) resume();
      else toSetMode();
    } else if (e.key === "Escape") {
      if (document.body.classList.contains("run")) toSetMode();
    }
  });

  document.addEventListener("visibilitychange", function () { if (!document.hidden && running) tick(); });

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  }
})();
</script>
</body>
</html>
